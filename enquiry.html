<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry | ErrandEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <img src="images/my logo.png" alt="ErrandEase Logo">
            </div>
        
          <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="enquiry.html" class="active">Enquiry</a>
            <a href="contact.html">Contact</a>
          </nav>
        </div>
    </header>

    <main class="enquiry-container">
    <div class="enquiry-header">
        <h1>Service Enquiry</h1>
        <p>Tell us what you need, and we'll handle the rest. Fill out the details below!</p>
    </div>

    <div class="enquiry-form-card">
        <form id="enquiryForm" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" required placeholder="Your first name">
                </div>
                
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" required placeholder="Your last name">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="example@email.com">
            </div>

            <div class="form-group">
                <label for="service">Service Required</label>
                <input type="text" id="service" required placeholder="e.g., Grocery Delivery, Home Cleaning">
            </div>

            <button type="submit" class="submit-btn">Submit Enquiry</button>
        </form>
    </div>
</main>

    <footer>
        <p>&copy; 2026 ErrandEase | All Rights Reserved</p>
    </footer>
    <script src="./JAVASCRIPT/script.js"></script>
    
</body>
</html>
